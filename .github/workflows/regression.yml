name: llm-regression

on:
  workflow_dispatch:
  push:
    paths:
      - 'app.py'
      - 'tests/writing_cases.jsonl'
      - 'run_regression.py'

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run regression (mock)
        run: |
          python gate_regression.py --provider mock --model gpt-4.1-mini
